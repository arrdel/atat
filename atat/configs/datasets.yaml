# Stage Presets
stages:
  debug:
    description: "Small datasets for debugging - fast iteration"
    dataset_variants: ["small"]
    max_samples: 1000
    use_cache: false

  validation:
    description: "Medium datasets for validation - confirm correctness"
    dataset_variants: ["medium"]
    max_samples: 100000
    use_cache: true

  production:
    description: "Full datasets for publication results"
    dataset_variants: ["full"]
    max_samples: null
    use_cache: true

# Dataset Catalog
datasets:
  # OpenWebText Variants
  openwebtext:
    name: "OpenWebText"
    source: "huggingface:openwebtext"
    description: "40GB corpus of web text"
    
    variants:
      small:
        num_tokens: 100000
        samples: 1000
        cache_file: "./data_cache/openwebtext_small.dat"
        description: "~100K tokens for quick testing"
      
      medium:
        num_tokens: 10000000
        samples: 100000
        cache_file: "./data_cache/openwebtext_medium.dat"
        description: "~10M tokens for validation"
      
      full:
        num_tokens: 262000000000  # 262B tokens
        samples: null
        cache_file: "./data_cache/openwebtext_train_bs1024_wrapped.dat"
        description: "Full OpenWebText corpus for production"
    
    splits:
      train:
        cache_files:
          small: "./data_cache/openwebtext_small.dat"
          medium: "./data_cache/openwebtext_medium.dat"
          full: "./data_cache/openwebtext_train_bs1024_wrapped.dat"
      
      validation:
        cache_files:
          small: "./data_cache/wikitext2_small.dat"
          medium: "./data_cache/wikitext2_medium.dat"
          full: "./data_cache/wikitext2_validation_bs1024_wrapped.dat"

  # WikiText2 Variants
  wikitext2:
    name: "WikiText2"
    source: "huggingface:wikitext/wikitext-2-v1"
    description: "2.1M tokens dataset from Wikipedia"
    
    variants:
      small:
        num_tokens: 50000
        samples: 500
        cache_file: "./data_cache/wikitext2_small.dat"
        description: "~50K tokens for validation"
      
      medium:
        num_tokens: 500000
        samples: 5000
        cache_file: "./data_cache/wikitext2_medium.dat"
        description: "~500K tokens for validation"
      
      full:
        num_tokens: 2100000
        samples: null
        cache_file: "./data_cache/wikitext2_validation_bs1024_wrapped.dat"
        description: "Full WikiText2 corpus"



# Default Configuration
defaults:
  dataset: "openwebtext"
  stage: "production"
  variant: "full"

# Experiment-specific Dataset Configurations
# Maps paper experiments to their dataset configurations

phase_configurations:
  # Table 1: Main comparison (7 benchmarks)
  MAIN_COMPARISON:
    dataset: "openwebtext"
    train_variant: "full"
    val_datasets: ["wikitext2", "lambada", "ptb", "lm1b", "ag_news", "pubmed", "arxiv"]
    batch_size: 64
    description: "Main PPL comparison across 7 benchmarks (Table 1)"

  # Table 2: Importance estimation ablation
  IMPORTANCE_ABLATION:
    dataset: "openwebtext"
    train_variant: "full"
    val_dataset: "wikitext2"
    val_variant: "full"
    batch_size: 64
    description: "4 importance estimator variants (Table 2)"

  # Table 4: Masking strategy ablation
  MASKING_ABLATION:
    dataset: "openwebtext"
    train_variant: "full"
    val_dataset: "wikitext2"
    val_variant: "full"
    batch_size: 64
    description: "4 masking strategies (Table 4)"

  # Debug: Quick iteration
  DEBUG:
    dataset: "openwebtext"
    train_variant: "small"
    val_dataset: "wikitext2"
    val_variant: "small"
    batch_size: 16
    description: "Debug with small datasets"

# Tokenizer Configuration
tokenizer:
  default: "gpt2"
  cache_dir: "./tokenizer_cache"
  force_download: false

# Data Loading Parameters
data_loading:
  num_workers: 32
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
